plugins {
    id "java"
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
    maven { url "https://frcmaven.wpi.edu/release/" }
}

def wpilibVersion = "2026.2.1"

dependencies {
    implementation "edu.wpi.first.wpilibj:wpilibj-java:${wpilibVersion}"
    implementation "edu.wpi.first.wpimath:wpimath-java:${wpilibVersion}"
    implementation "edu.wpi.first.ntcore:ntcore-java:${wpilibVersion}"
    implementation "edu.wpi.first.wpiutil:wpiutil-java:${wpilibVersion}"
    implementation "edu.wpi.first.hal:hal-java:${wpilibVersion}"
    implementation "edu.wpi.first.wpiunits:wpiunits-java:${wpilibVersion}"

    // WPILib geometry classes (Pose2d, etc.) use quickbuf for struct serialization.
    // GradleRIO provides this automatically, but standalone builds need it explicit.
    implementation "us.hebi.quickbuf:quickbuf-runtime:1.4"

}
